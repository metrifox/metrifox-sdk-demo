name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install React dependencies
        working-directory: ./react-sdk
        run: npm ci

      - name: Build React
        working-directory: ./react-sdk
        run: npm run build

      - name: Install Angular dependencies
        working-directory: ./angular-sdk
        run: npm ci

      - name: Build Angular
        working-directory: ./angular-sdk
        run: npx ng build --base-href /angular/

      - name: Combine builds
        run: |
          mkdir -p _site/react _site/angular
          cp -r react-sdk/dist/* _site/react/
          cp -r angular-sdk/dist/angular-sdk/browser/* _site/angular/
          cp landing/index.html _site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

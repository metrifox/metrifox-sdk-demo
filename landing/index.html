<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metrifox SDK Playground</title>
  <style>
    :root {
      --bg: #f9fafb;
      --surface: #ffffff;
      --border: #e5e7eb;
      --text: #1f2937;
      --text-muted: #6b7280;
      --accent: #2563eb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .header p {
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    .cards {
      display: flex;
      gap: 2rem;
      max-width: 720px;
      width: 100%;
    }

    .card {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1);
    }

    .card-icon {
      width: 48px;
      height: 48px;
      margin-bottom: 1rem;
    }

    .card h2 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .card p {
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .footer {
      margin-top: 3rem;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .cards { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Metrifox SDK Playground</h1>
    <p>Choose a framework to explore the SDK demo</p>
  </div>

  <div class="cards">
    <a href="./react/" class="card">
      <svg class="card-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="8" fill="#61DAFB"/>
        <ellipse cx="50" cy="50" rx="44" ry="17" stroke="#61DAFB" stroke-width="3" fill="none"/>
        <ellipse cx="50" cy="50" rx="44" ry="17" stroke="#61DAFB" stroke-width="3" fill="none" transform="rotate(60 50 50)"/>
        <ellipse cx="50" cy="50" rx="44" ry="17" stroke="#61DAFB" stroke-width="3" fill="none" transform="rotate(120 50 50)"/>
      </svg>
      <h2>React</h2>
      <p>Demo using @metrifox/react-sdk with React 19 and Vite</p>
    </a>

    <a href="./angular/" class="card">
      <svg class="card-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 5L95 25L88 80L50 95L12 80L5 25L50 5Z" fill="#DD0031"/>
        <path d="M50 5V95L88 80L95 25L50 5Z" fill="#C3002F"/>
        <path d="M50 15L25 72H35L40 58H60L65 72H75L50 15ZM55 50H45L50 35L55 50Z" fill="white"/>
      </svg>
      <h2>Angular</h2>
      <p>Demo using @metrifox/angular-sdk with Angular 19</p>
    </a>
  </div>

  <div class="footer">
    <a href="https://docs.metrifox.com">Documentation</a>
  </div>
</body>
</html>
